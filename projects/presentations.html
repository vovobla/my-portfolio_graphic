<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентации — Владимир Волков</title>
    <style>
        body {
            background-color: #f4f7ff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            color: #000; -webkit-font-smoothing: antialiased;
            overflow-x: hidden; cursor: none;
        }

        /* Навигация */
        .nav-bar {
            width: 100%; display: flex; justify-content: space-between;
            padding: 32px 30px; position: fixed; top: 0; z-index: 1000;
            box-sizing: border-box; mix-blend-mode: difference;
        }

        .nav-bar a { color: #fff; text-decoration: none; font-size: 16px; cursor: none !important; }

        /* Контент */
        .case-content { width: 100%; max-width: 940px; margin-top: 160px; padding: 0 20px; box-sizing: border-box; }

        .case-hero-title {
            font-size: clamp(50px, 8vw, 120px); font-weight: 600; letter-spacing: -4px;
            margin: 0 0 40px 0; line-height: 0.9; text-transform: uppercase;
        }

        .case-info { margin-bottom: 80px; max-width: 600px; }
        .info-label { font-size: 14px; color: rgba(0, 0, 0, 0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .info-text { font-size: 20px; line-height: 1.4; font-weight: 500; }

        .presentation-block { margin-bottom: 100px; width: 100%; position: relative; }
        
        .carousel-container {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            border-radius: 32px; overflow: hidden; background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .carousel-track {
            display: flex; height: 100%; transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Зоны взаимодействия */
        .hover-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 20; }
        .hover-prev { left: 0; }
        .hover-next { right: 0; }

        /* Точки (адаптивные под любое количество) */
        .carousel-nav {
            display: flex; gap: 8px; margin-top: 24px; justify-content: center;
            flex-wrap: wrap; max-width: 90%; margin-left: auto; margin-right: auto;
        }

        .nav-dot {
            width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.15);
            transition: all 0.4s ease;
        }

        .nav-dot.active { background: #000; width: 20px; border-radius: 10px; }

        /* КУРСОР */
        #custom-cursor {
            position: fixed; width: 20px; height: 20px; background-color: #000;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            top: 0; left: 0; transform: translate(-50%, -50%);
            transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1), 
                        height 0.4s cubic-bezier(0.23, 1, 0.32, 1), 
                        border-radius 0.4s cubic-bezier(0.23, 1, 0.32, 1),
                        background-color 0.3s;
            white-space: nowrap; overflow: hidden;
        }

        #cursor-text { color: #fff; font-size: 15px; opacity: 0; transition: opacity 0.2s; }
        
        /* Состояния курсора */
        .cursor-active { height: 40px !important; border-radius: 32px !important; }
        .cursor-active #cursor-text { opacity: 1; }
        
        .cursor-slider-mode { 
            width: 54px !important; 
            height: 54px !important; 
            background-color: rgba(0,0,0,0.9) !important; 
        }
        .cursor-slider-mode #cursor-text { opacity: 1; font-size: 20px; font-weight: 300; }

        @media (max-width: 768px) { .case-hero-title { letter-spacing: -2px; } }
    </style>
</head>
<body>

    <div id="custom-cursor"><span id="cursor-text">Перейти</span></div>

    <div class="nav-bar">
        <a href="../index.html" class="nav-target">Владимир Волков</a>
        <a href="https://t.me/vovobla" class="nav-target">Связаться</a>
    </div>

    <main class="case-content">
        <h1 class="case-hero-title">Презентации</h1>

        <div class="case-info">
            <span class="info-label">Сборник работ</span>
            <p class="info-text">Визуализация сложных данных, разработка структуры выступлений и создание презентационных материалов</p>
        </div>

        <div class="presentation-block">
            <span class="info-label">АСИ / Агенство Стратегических Инициатив</span>
            <div class="carousel-container">
                <div class="hover-zone hover-prev"></div>
                <div class="hover-zone hover-next"></div>
                <div class="carousel-track">
                    <div class="slide"><img src="../assets/pres/АСИ/1.png"></div>
                    <div class="slide"><img src="../assets/pres/АСИ/2.png"></div>
                    <div class="slide"><img src="../assets/pres/АСИ/3.png"></div>
                    <div class="slide"><img src="../assets/pres/АСИ/4.png"></div>
                </div>
            </div>
            <div class="carousel-nav"></div>
        </div>
        
        <div class="presentation-block">
            <span class="info-label">   Challenge Cup Russia 2026</span>
            <div class="carousel-container">
                <div class="hover-zone hover-prev"></div>
                <div class="hover-zone hover-next"></div>
                <div class="carousel-track">
                    <div class="slide"><img src="../assets/pres/Cup/1.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/2.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/3.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/4.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/5.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/6.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/7.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/8.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/9.png"></div>
                    <div class="slide"><img src="../assets/pres/Cup/10.png"></div>
                </div>
            </div>
            <div class="carousel-nav"></div>
        </div>

        <div class="presentation-block">
            <span class="info-label">Хакатон Т1 Минск 2025</span>
            <div class="carousel-container">
                <div class="hover-zone hover-prev"></div>
                <div class="hover-zone hover-next"></div>
                <div class="carousel-track">
                    <div class="slide"><img src="../assets/pres/T1/1.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/2.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/3.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/4.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/5.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/6.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/7.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/8.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/9.png"></div>
                    <div class="slide"><img src="../assets/pres/T1/10.png"></div>
                </div>
            </div>
            <div class="carousel-nav"></div>
        </div>

        <div class="presentation-block">
            <span class="info-label">ITAM Courses Hack / Церемония награждения</span>
            <div class="carousel-container">
                <div class="hover-zone hover-prev"></div>
                <div class="hover-zone hover-next"></div>
                <div class="carousel-track">
                    <div class="slide"><img src="../assets/pres/ITAM Courses/1.png"></div>
                    <div class="slide"><img src="../assets/pres/ITAM Courses/2.png"></div>
                    <div class="slide"><img src="../assets/pres/ITAM Courses/3.png"></div>
                    <div class="slide"><img src="../assets/pres/ITAM Courses/4.png"></div>
                    <div class="slide"><img src="../assets/pres/ITAM Courses/5.png"></div>
                    <div class="slide"><img src="../assets/pres/ITAM Courses/6.png"></div>
                </div>
            </div>
            <div class="carousel-nav"></div>
        </div>
    </main>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const cursorText = document.getElementById('cursor-text');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        
        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            cursor.style.transform = `translate(${cursorX}px, ${cursorY}px) translate(-50%, -50%)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        const blocks = document.querySelectorAll('.presentation-block');

        blocks.forEach(block => {
            const track = block.querySelector('.carousel-track');
            const slides = block.querySelectorAll('.slide');
            const nav = block.querySelector('.carousel-nav');
            const container = block.querySelector('.carousel-container');
            let currentIndex = 0;
            let autoPlayInterval;

            // Динамическое создание точек под количество слайдов
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.classList.add('nav-dot');
                if (i === 0) dot.classList.add('active');
                nav.appendChild(dot);
            });
            const dots = nav.querySelectorAll('.nav-dot');

            function updateSlider(index) {
                if (index >= slides.length) currentIndex = 0;
                else if (index < 0) currentIndex = slides.length - 1;
                else currentIndex = index;

                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
            }

            // 1. Автослайдер (работает при бездействии)
            function startAuto() { autoPlayInterval = setInterval(() => updateSlider(currentIndex + 1), 4000); }
            function stopAuto() { clearInterval(autoPlayInterval); }
            startAuto();

            // 2. Работа без мышки (Hover-свайп)
            const zoneNext = block.querySelector('.hover-next');
            const zonePrev = block.querySelector('.hover-prev');

            container.addEventListener('mouseenter', () => {
                stopAuto();
                cursor.classList.add('cursor-slider-mode');
            });
            
            container.addEventListener('mouseleave', () => {
                startAuto();
                cursor.classList.remove('cursor-slider-mode');
                cursorText.textContent = "Перейти"; 
            });

            zoneNext.addEventListener('mouseenter', () => { cursorText.textContent = "→"; });
            zoneNext.addEventListener('click', () => updateSlider(currentIndex + 1));

            zonePrev.addEventListener('mouseenter', () => { cursorText.textContent = "←"; });
            zonePrev.addEventListener('click', () => updateSlider(currentIndex - 1));

            // 3. Клавиатура (Стрелки)
            document.addEventListener('keydown', (e) => {
                const rect = container.getBoundingClientRect();
                // Переключаем только если блок виден на экране
                if (rect.top < window.innerHeight && rect.bottom > 0) {
                    if (e.key === "ArrowRight") updateSlider(currentIndex + 1);
                    if (e.key === "ArrowLeft") updateSlider(currentIndex - 1);
                }
            });
        });

        // Курсор для ФИО и ссылки Связаться
        document.querySelectorAll('.nav-target').forEach(t => {
            t.addEventListener('mouseenter', () => {
                cursorText.textContent = "Перейти";
                cursor.style.width = "100px";
                cursor.classList.add('cursor-active');
            });
            t.addEventListener('mouseleave', () => {
                cursor.classList.remove('cursor-active');
                cursor.style.width = "20px";
            });
        });
    </script>
</body>
</html>
